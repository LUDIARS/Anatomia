<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anatomia — Code Graph Viz</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e1e4e8; }
    h1 { padding: 12px 16px; font-size: 1.1rem; background: #161b22; border-bottom: 1px solid #30363d; }
    #main { display: flex; height: calc(100vh - 44px); }
    #graph-panel { flex: 1; position: relative; }
    #graph { width: 100%; height: 100%; }
    #side { width: 340px; overflow-y: auto; background: #161b22; border-left: 1px solid #30363d; padding: 12px; }
    #side h2 { font-size: 0.9rem; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    th { background: #21262d; padding: 4px 6px; text-align: left; color: #8b949e; position: sticky; top: 0; }
    td { padding: 3px 6px; border-bottom: 1px solid #21262d; font-family: monospace; }
    tr:hover td { background: #1c2129; }
    .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.7rem; }
    .high { background: #da3633; color: #fff; }
    .med  { background: #d29922; color: #000; }
    .low  { background: #238636; color: #fff; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
               background: rgba(15,17,23,0.85); font-size: 1rem; }
  </style>
</head>
<body>
  <h1>Anatomia — Code Graph Viz</h1>
  <div id="main">
    <div id="graph-panel">
      <div id="graph"></div>
      <div id="loading">Loading graph…</div>
    </div>
    <div id="side">
      <h2>Complexity Metrics</h2>
      <table id="metrics-table">
        <thead>
          <tr>
            <th>Anchor</th>
            <th>Fan-in</th>
            <th>Fan-out</th>
            <th>Cyclo</th>
            <th>Coupling</th>
          </tr>
        </thead>
        <tbody id="metrics-body"></tbody>
      </table>
    </div>
  </div>
  <script>
    async function loadData() {
      const [graphRes, metricsRes] = await Promise.all([
        fetch('/api/graph'),
        fetch('/api/metrics'),
      ]);
      return {
        graph: await graphRes.json(),
        metrics: await metricsRes.json(),
      };
    }

    function couplingClass(c) {
      if (c >= 10) return 'high';
      if (c >= 4)  return 'med';
      return 'low';
    }

    function shortAnchor(id) {
      return id.length > 12 ? id.slice(0, 12) + '…' : id;
    }

    function renderMetrics(metrics) {
      const tbody = document.getElementById('metrics-body');
      // Sort by coupling desc
      const sorted = [...metrics].sort((a, b) => b.coupling - a.coupling);
      tbody.innerHTML = sorted.map(m => `
        <tr>
          <td title="${m.anchor}">${shortAnchor(m.anchor)}</td>
          <td>${m.fanIn}</td>
          <td>${m.fanOut}</td>
          <td>${m.cyclomatic}</td>
          <td><span class="badge ${couplingClass(m.coupling)}">${m.coupling}</span></td>
        </tr>
      `).join('');
    }

    function renderGraph(graphData, metrics) {
      const couplingById = Object.fromEntries(metrics.map(m => [m.anchor, m.coupling]));

      const visNodes = graphData.nodes.map(n => ({
        id: n.id,
        label: n.name,
        title: `${n.kind} · ${n.id}\n${n.sourceRange.filePath}:${n.sourceRange.start.line}`,
        color: {
          background: couplingById[n.id] >= 10 ? '#da3633'
                    : couplingById[n.id] >= 4  ? '#d29922'
                    : '#238636',
          border: '#30363d',
        },
        font: { color: '#e1e4e8', size: 11 },
      }));

      const visEdges = graphData.edges.map(e => ({
        from: e.from,
        to: e.to,
        label: e.kind,
        arrows: 'to',
        font: { size: 9, color: '#8b949e' },
        color: { color: '#30363d' },
      }));

      const container = document.getElementById('graph');
      new vis.Network(
        container,
        { nodes: visNodes, edges: visEdges },
        {
          layout: { improvedLayout: true },
          physics: { stabilization: { iterations: 150 }, solver: 'forceAtlas2Based' },
          interaction: { hover: true, tooltipDelay: 100 },
          nodes: { shape: 'dot', size: 12 },
        }
      );
    }

    loadData().then(({ graph, metrics }) => {
      renderMetrics(metrics);
      renderGraph(graph, metrics);
      document.getElementById('loading').style.display = 'none';
    }).catch(err => {
      document.getElementById('loading').textContent = 'Error: ' + err.message;
    });
  </script>
</body>
</html>
